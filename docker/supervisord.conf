# supervisor — runs both nginx and uvicorn in one container.
# supervisor itself runs as root (needs to, to start nginx master);
# uvicorn is dropped to PUID:PGID via gosu in [program:backend].
[supervisord]
nodaemon=true
user=root
logfile=/dev/null           # logs go to container stdout/stderr below
pidfile=/tmp/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:backend]
command=gosu appuser uvicorn app.main:app --host 127.0.0.1 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

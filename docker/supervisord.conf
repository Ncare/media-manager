# supervisor — runs both nginx and uvicorn in one container.
# supervisor itself runs as root (needs to, to start nginx master);
# uvicorn is dropped to the media directory's owner uid/gid via gosu
# (resolved in entrypoint.sh and read here by the run-backend wrapper).
[supervisord]
nodaemon=true
user=root
logfile=/dev/null           # logs go to container stdout/stderr below
pidfile=/tmp/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:backend]
# PUID/PGID are exported by entrypoint.sh (auto-detected from /media owner,
# or explicit, or default 1000). gosu drops to that identity before uvicorn.
command=sh -c "exec gosu ${PUID:-1000}:${PGID:-1000} uvicorn app.main:app --host 127.0.0.1 --port 8000"
directory=/app
environment=PYTHONUNBUFFERED="1",DB_PATH="/data/media_manager.db",MEDIA_ROOT="/media"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

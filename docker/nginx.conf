# All-in-one nginx config — same container as the FastAPI backend.
# proxy_pass targets the loopback (uvicorn listens on 127.0.0.1:8000).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy to backend (same container, loopback)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;              # important for SSE
        proxy_cache off;
    }

    # Served media images (posters/fanart) proxied to backend
    location /media/ {
        proxy_pass http://127.0.0.1:8000/media/;
        proxy_set_header Host $host;
    }
}

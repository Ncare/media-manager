# =========================================================================
#  绿联 UGOS Pro 专用部署模板 —— all-in-one 单容器版
#
#  一个镜像、一个容器、一个端口,部署最省心。
#
#  使用方法:
#    1. 复制下面 services: 到 volumes: 之间的全部内容
#    2. 只需改 2 处【需要修改】:TMDB 密钥 + 媒体目录路径
#    3. 粘贴到绿联 Docker 应用 → 项目 → 新建 的 compose 框里
#    4. 点「部署 / 启动」
#
#  镜像来自 GHCR 公开仓库,绿联会自动拉取,无需登录。
#  访问地址:http://你的NAS的IP:9000
# =========================================================================
services:
  media-manager:
    image: ghcr.io/ncare/media-manager:latest
    container_name: media-manager
    environment:
      - TMDB_API_KEY=改这里填你的TMDB密钥      # 【1】填你的 key;没 key 先留空字符串也行
      - TMDB_LANGUAGE=zh-CN
      - PUID=1000
      - PGID=1000
      # 国内 NAS 访问 TMDB 需要代理,有两种方式(二选一):
      #   方式 A(推荐):部署后进「设置」页,开启「启用代理」并填代理地址
      #   方式 B:在这里加环境变量,对所有 HTTP 请求全局生效
      #           - HTTP_PROXY=http://你的NAS_IP:7890
      #           - HTTPS_PROXY=http://你的NAS_IP:7890
      #           - NO_PROXY=localhost,127.0.0.1,192.168.0.0/16
    volumes:
      - /这里换成你NAS的媒体目录绝对路径:/media   # 【2】见下方说明,在 NAS 上查
      - media-manager-data:/data             # 数据库持久化,保持不动
    ports:
      - "9000:80"                            # 访问端口:浏览器开 http://NAS的IP:9000
    restart: unless-stopped

volumes:
  media-manager-data:

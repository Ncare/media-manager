name: Build & Publish Docker Images

# Builds backend + frontend images for amd64 and arm64, then merges them
# into a single multi-arch manifest pushed to GHCR. We use GitHub's NATIVE
# arm64 runner (ubuntu-24.04-arm, free for public repos) instead of QEMU
# emulation — QEMU crashes on native binaries like esbuild
# ("qemu: uncaught target signal 4 (Illegal instruction)").
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:        # allow manual run from the Actions tab

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX = ghcr.io/<owner>/<repo>-  (owner lowercased per step)
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}-

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      # one job per (service, arch) → each builds natively on a real arch runner
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        target: [backend, frontend]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm     # native ARM runner, no QEMU
          # backend Dockerfile has no build stage → no target
          - target: backend
            context: ./backend
            stage: ''
          # frontend uses a multi-stage build; we want the final `prod` (nginx) stage
          - target: frontend
            context: ./frontend
            stage: prod
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase image name
        id: name
        run: echo "image=$(echo '${{ env.IMAGE_PREFIX }}${{ matrix.target }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no secret to set

      - name: Build & push ${{ matrix.target }} (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.stage }}
          platforms: linux/${{ matrix.arch }}
          push: true
          # per-arch tag, merged into a single multi-arch tag in the next job
          tags: ${{ steps.name.outputs.image }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }},mode=max

  merge:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - name: Set lowercase image name
        id: name
        run: echo "image=$(echo '${{ env.IMAGE_PREFIX }}${{ matrix.target }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ steps.name.outputs.image }}:latest \
            -t ${{ steps.name.outputs.image }}:${{ github.sha }} \
            ${{ steps.name.outputs.image }}:${{ github.sha }}-amd64 \
            ${{ steps.name.outputs.image }}:${{ github.sha }}-arm64

      - name: Show final manifest
        run: docker buildx imagetools inspect ${{ steps.name.outputs.image }}:latest
